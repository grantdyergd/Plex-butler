<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Browser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #e2e8f0;
            --accent: #6366f1;
            --accent2: #6366f1;
            --text: #0f172a;
            --muted: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-title { font-size: 16px; font-weight: 700; flex: 1; }
        .header-sub { font-size: 11px; color: var(--muted); }
        .back-btn {
            text-decoration: none;
            color: #475569;
            font-size: 13px;
            padding: 6px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .back-btn:hover { background: #f1f5f9; color: #0f172a; }
        .status-row { display: flex; gap: 12px; align-items: center; }
        .dot-wrap { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; }
        .dot.ok { background: var(--green); }
        .dot.err { background: var(--red); }
        @media (max-width: 480px) { .status-row { display: none; } }

        /* ── Search bar ── */
        .search-section {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }
        .search-row {
            display: flex;
            gap: 8px;
            max-width: 700px;
            margin: 0 auto;
        }
        .search-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: var(--accent2); }
        .search-input::placeholder { color: var(--muted); }
        .search-btn {
            background: var(--accent2);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
        }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .type-pills {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        .pill {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            transition: all 0.15s;
        }
        .pill.active { background: var(--accent2); color: #fff; border-color: var(--accent2); font-weight: 600; }

        /* ── Tab nav ── */
        .tab-nav {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            border: none;
            background: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            font-family: inherit;
            transition: all 0.15s;
        }
        .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

        /* ── Content area ── */
        .content { flex: 1; overflow-y: auto; }
        .tab-panel { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
        .tab-panel.active { display: block; }

        /* ── Cards ── */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        @media (max-width: 480px) {
            .results-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
        .media-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        .media-card:hover { border-color: #cbd5e1; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
        .card-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #f1f5f9;
        }
        .card-poster-placeholder {
            width: 100%;
            aspect-ratio: 2/3;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .card-body { padding: 8px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .card-title { font-size: 12px; font-weight: 600; line-height: 1.3; }
        .card-meta { font-size: 11px; color: var(--muted); }
        .card-badges { display: flex; flex-wrap: wrap; gap: 3px; margin: 2px 0; }
        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        .badge-green { background: #ecfdf5; color: #059669; }
        .badge-blue { background: rgba(99,102,241,0.1); color: var(--accent2); }
        .badge-red { background: #fef2f2; color: #dc2626; }
        .card-actions { display: flex; gap: 4px; margin-top: auto; padding-top: 4px; }
        .card-btn {
            flex: 1;
            padding: 6px 4px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            text-align: center;
        }
        .card-btn-add { background: var(--accent2); color: #fff; }
        .card-btn-add:hover { background: #4f46e5; }
        .card-btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
        .card-btn-done { background: #ecfdf5; color: #059669; cursor: default; }
        .card-btn-remove { background: #fef2f2; color: #dc2626; }
        .card-btn-remove:hover { background: #fee2e2; }

        /* ── Queue items ── */
        .queue-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
        }
        .queue-title { font-size: 14px; font-weight: 600; }
        .queue-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .progress-bar {
            margin-top: 8px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; transition: width 0.3s; }

        /* ── Watchlist items ── */
        .wl-list { display: flex; flex-direction: column; gap: 8px; }
        .wl-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .wl-poster {
            width: 36px;
            height: 54px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--surface);
            flex-shrink: 0;
        }
        .wl-poster-ph {
            width: 36px;
            height: 54px;
            border-radius: 4px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .wl-info { flex: 1; min-width: 0; }
        .wl-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wl-meta { font-size: 11px; color: var(--muted); }
        .wl-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .wl-btn {
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
        }
        .wl-btn-add { background: var(--accent2); color: #fff; }
        .wl-btn-remove { background: #fef2f2; color: #dc2626; }
        .wl-btn-watchlist { background: rgba(99,102,241,0.1); color: var(--accent); }
        .wl-btn-watchlist-done { background: #ecfdf5; color: #059669; cursor: default; }

        /* ── Watchlist search ── */
        .wl-search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .wl-search-input {
            flex: 1;
            padding: 9px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
        }
        .wl-search-input:focus { outline: none; border-color: var(--accent); }
        .wl-search-btn {
            padding: 9px 16px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }
        .wl-search-results-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 4px;
        }
        .wl-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }

        /* ── Calendar ── */
        .cal-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .cal-date {
            background: var(--surface);
            border-radius: 6px;
            padding: 4px 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent2);
            flex-shrink: 0;
            min-width: 44px;
        }
        .cal-info { flex: 1; min-width: 0; }
        .cal-title { font-size: 13px; font-weight: 600; }
        .cal-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── Disk space ── */
        .disk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        @media (max-width: 400px) { .disk-grid { grid-template-columns: 1fr; } }
        .disk-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }
        .disk-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
        .disk-value { font-size: 22px; font-weight: 700; color: var(--accent2); }
        .disk-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

        /* ── Section titles ── */
        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 16px 0 10px;
        }
        .section-title:first-child { margin-top: 0; }

        /* ── Empty / loading / error states ── */
        .state-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 14px;
        }
        .state-msg .icon { font-size: 32px; margin-bottom: 8px; }
        .spinner {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-top-color: var(--accent2);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Profile selector modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.15);
        }
        .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
        .modal-item {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 14px;
            transition: background 0.15s;
        }
        .modal-item:hover { background: #f1f5f9; }
        .modal-item.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .modal-section-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .modal-select {
            width: 100%;
            padding: 9px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }
        .modal-watchlist-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-size: 13px;
            color: var(--text);
        }
        .modal-watchlist-row input[type=checkbox] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .modal-watchlist-row label { cursor: pointer; }
        .modal-confirm-btn {
            flex: 1;
            padding: 10px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .modal-confirm-btn:hover { opacity: 0.88; }
        .modal-cancel {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── Discover rows ── */
        .discover-section { margin-bottom: 24px; }
        .discover-section:last-child { margin-bottom: 0; }
        .discover-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .discover-row::-webkit-scrollbar { display: none; }
        .disc-card {
            flex-shrink: 0;
            width: 130px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .disc-card:hover { border-color: #cbd5e1; box-shadow: 0 2px 6px 0 rgb(0 0 0 / 0.1); }
        .disc-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #f1f5f9;
            display: block;
        }
        .disc-poster-ph {
            width: 100%;
            aspect-ratio: 2/3;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .disc-body { padding: 7px 8px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
        .disc-title { font-size: 11px; font-weight: 700; line-height: 1.3; color: var(--text); }
        .disc-meta { font-size: 10px; color: var(--muted); }
        .disc-rating {
            font-size: 10px;
            font-weight: 600;
            color: #f59e0b;
        }
        .disc-date { font-size: 10px; color: #6366f1; font-weight: 600; }
        .disc-badge-lib {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            background: #ecfdf5;
            color: #059669;
        }
        .disc-overview {
            font-size: 10px;
            color: var(--muted);
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            margin-top: 2px;
        }
        .disc-btn {
            margin-top: auto;
            padding-top: 5px;
            display: flex;
            gap: 4px;
        }
        .disc-btn button {
            flex: 1;
            padding: 5px 2px;
            font-size: 10px;
            font-weight: 600;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .disc-btn-add { background: var(--accent); color: #fff; }
        .disc-btn-add:hover { background: #4f46e5; }
        .disc-btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
        .disc-btn-done { background: #ecfdf5; color: #059669; cursor: default; }
        .disc-btn-wl { background: rgba(99,102,241,0.1); color: var(--accent); }
        .disc-btn-wl:hover { background: rgba(99,102,241,0.2); }
        .disc-btn-wl:disabled { opacity: 0.5; cursor: not-allowed; }
        .disc-btn-info { display: inline-flex; align-items: center; justify-content: center; padding: 4px 8px; border-radius: 6px; font-size: 12px; text-decoration: none; background: rgba(0,0,0,0.05); color: var(--text-secondary); transition: background 0.15s; }
        .disc-btn-info:hover { background: rgba(0,0,0,0.12); }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 4px 12px rgb(0 0 0 / 0.1);
            animation: toastIn 0.2s ease, toastOut 0.3s ease 2.7s forwards;
        }
        .toast.success { border-color: var(--green); color: #059669; }
        .toast.error { border-color: var(--red); color: #dc2626; }
        .toast.info { border-color: var(--accent); color: var(--accent); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<div class="header">
    <div style="flex:1;">
        <div class="header-title">🎬 Media Browser</div>
        <div class="header-sub">Sonarr · Radarr · Plex</div>
    </div>
    <div class="status-row">
        <div class="dot-wrap"><div class="dot" id="dot-sonarr"></div>sonarr</div>
        <div class="dot-wrap"><div class="dot" id="dot-radarr"></div>radarr</div>
        <div class="dot-wrap"><div class="dot" id="dot-plex"></div>plex</div>
    </div>
    <a href="/" class="back-btn">← Back</a>
</div>

<div class="search-section">
    <div class="search-row">
        <input class="search-input" id="searchInput" type="search" placeholder="Search movies & TV shows..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>
    <div class="type-pills">
        <button class="pill active" data-type="all" onclick="setPill(this,'all')">All</button>
        <button class="pill" data-type="movie" onclick="setPill(this,'movie')">Movies</button>
        <button class="pill" data-type="show" onclick="setPill(this,'show')">TV Shows</button>
    </div>
</div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('search')">🔍 Search</button>
    <button class="tab-btn" onclick="showTab('discover')">✨ Discover</button>
    <button class="tab-btn" onclick="showTab('watchlist')">🟡 Watchlist</button>
    <button class="tab-btn" onclick="showTab('queue')">⬇ Downloads</button>
    <button class="tab-btn" onclick="showTab('activity')">📅 Activity</button>
</div>

<div class="content">

    <!-- Search Tab -->
    <div class="tab-panel active" id="tab-search">
        <div id="search-results">
            <div class="state-msg">
                <div class="icon">🔍</div>
                Search for any movie or TV show above.<br>Results will show what's already in your library.
            </div>
        </div>
    </div>

    <!-- Discover Tab -->
    <div class="tab-panel" id="tab-discover">
        <div id="discover-content">
            <div class="state-msg"><div class="spinner"></div>Loading recommendations…</div>
        </div>
    </div>

    <!-- Watchlist Tab -->
    <div class="tab-panel" id="tab-watchlist">
        <div id="wl-search-results"></div>
        <div class="wl-divider" id="wlDivider" style="display:none"></div>
        <div id="wl-content">
            <div class="state-msg"><div class="spinner"></div>Loading watchlist…</div>
        </div>
    </div>

    <!-- Queue Tab -->
    <div class="tab-panel" id="tab-queue">
        <div id="queue-content">
            <div class="state-msg"><div class="spinner"></div>Loading downloads…</div>
        </div>
    </div>

    <!-- Activity Tab -->
    <div class="tab-panel" id="tab-activity">
        <div id="activity-content">
            <div class="state-msg"><div class="spinner"></div>Loading activity…</div>
        </div>
    </div>

</div>

<!-- Profile picker modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal">
        <div class="modal-title" id="modalTitle">Add to Library</div>

        <div id="modalProfileSection">
            <div class="modal-section-label">Quality Profile</div>
            <div id="modalProfiles"></div>
        </div>

        <div id="modalFolderSection" style="margin-top:14px">
            <div class="modal-section-label">Destination Folder</div>
            <select id="modalFolderSelect" class="modal-select"></select>
        </div>

        <div class="modal-watchlist-row">
            <input type="checkbox" id="modalWatchlistCheck">
            <label for="modalWatchlistCheck">Also add to Plex watchlist</label>
        </div>

        <div style="display:flex;gap:8px;margin-top:16px">
            <button class="modal-confirm-btn" onclick="confirmAdd()">Add</button>
            <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
    let currentType = 'all';
    let pendingAdd = null; // { type, item, profiles, rootFolders, btn }

    // ── Status check ──────────────────────────────────────────────────────
    fetch('/api/media-chat/status').then(r => r.json()).then(data => {
        document.getElementById('dot-sonarr').className = 'dot ' + (data.sonarr ? 'ok' : 'err');
        document.getElementById('dot-radarr').className = 'dot ' + (data.radarr ? 'ok' : 'err');
        document.getElementById('dot-plex').className   = 'dot ' + (data.plex ? 'ok' : 'err');
    }).catch(() => {});

    // ── Tab nav ───────────────────────────────────────────────────────────
    const loaded = { watchlist: false, queue: false, activity: false, discover: false };

    const searchInput = document.getElementById('searchInput');
    const searchBtn   = document.getElementById('searchBtn');

    function showTab(name) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        event.currentTarget.classList.add('active');

        // Update placeholder and type-pill visibility based on context
        const pills = document.querySelector('.type-pills');
        if (name === 'watchlist') {
            searchInput.placeholder = 'Search to add to watchlist…';
            if (pills) pills.style.display = 'none';
        } else {
            searchInput.placeholder = 'Search movies & TV shows…';
            if (pills) pills.style.display = '';
        }

        // Clear stale watchlist search results when leaving watchlist tab
        if (name !== 'watchlist') {
            document.getElementById('wl-search-results').innerHTML = '';
            document.getElementById('wlDivider').style.display = 'none';
        }

        if (name === 'watchlist' && !loaded.watchlist) loadWatchlist();
        if (name === 'discover'  && !loaded.discover)  loadDiscover();
        if (name === 'queue'     && !loaded.queue)     loadQueue();
        if (name === 'activity'  && !loaded.activity)  loadActivity();
    }

    // ── Search ────────────────────────────────────────────────────────────
    function setPill(el, type) {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        currentType = type;
    }

    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
        const q = searchInput.value.trim();
        if (!q) return;

        const activeTab = document.querySelector('.tab-panel.active')?.id;
        const onWatchlist = activeTab === 'tab-watchlist';

        searchBtn.disabled = true;
        searchBtn.textContent = '…';

        if (onWatchlist) {
            // Watchlist context — search TMDb and show results as "+ Watchlist" items
            const resultsEl = document.getElementById('wl-search-results');
            const divider   = document.getElementById('wlDivider');
            resultsEl.innerHTML = '<div class="state-msg" style="padding:10px 0"><div class="spinner"></div>Searching…</div>';
            divider.style.display = '';
            try {
                const r = await fetch(`/api/media/search?q=${encodeURIComponent(q)}&type=all`);
                const data = await r.json();
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
                if (data.error) { resultsEl.innerHTML = `<div class="state-msg">${esc(data.error)}</div>`; return; }
                if (!data.results || data.results.length === 0) {
                    resultsEl.innerHTML = `<div class="state-msg" style="padding:10px 0">No results for "<strong>${esc(q)}</strong>"</div>`;
                    return;
                }
                renderWlSearchResults(data.results, resultsEl);
            } catch(e) {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
                resultsEl.innerHTML = `<div class="state-msg">Search failed. Please try again.</div>`;
            }
        } else {
            // Normal search context — switch to Search tab and show TMDb cards
            const el = document.getElementById('search-results');
            el.innerHTML = '<div class="state-msg"><div class="spinner"></div>Searching…</div>';
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-search').classList.add('active');
            document.querySelector('.tab-btn').classList.add('active');
            try {
                const r = await fetch(`/api/media/search?q=${encodeURIComponent(q)}&type=${currentType}`);
                const data = await r.json();
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
                if (data.error) { el.innerHTML = `<div class="state-msg">${esc(data.error)}</div>`; return; }
                if (!data.results || data.results.length === 0) {
                    el.innerHTML = `<div class="state-msg"><div class="icon">🤷</div>No results found for "<strong>${esc(q)}</strong>"</div>`;
                    return;
                }
                renderSearchResults(data.results, el);
            } catch(e) {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Search';
                el.innerHTML = `<div class="state-msg">Search failed. Please try again.</div>`;
            }
        }
    }

    function renderSearchResults(results, container) {
        const grid = document.createElement('div');
        grid.className = 'results-grid';
        results.forEach((item, i) => {
            grid.appendChild(makeMediaCard(item, 'search', i));
        });
        container.innerHTML = '';
        container.appendChild(grid);
    }

    function makeMediaCard(item, prefix, i) {
        const card = document.createElement('div');
        card.className = 'media-card';

        const posterHtml = item.poster
            ? `<img class="card-poster" src="${esc(item.poster)}" alt="${esc(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              + `<div class="card-poster-placeholder" style="display:none">${item.mediaType === 'movie' ? '🎬' : '📺'}</div>`
            : `<div class="card-poster-placeholder">${item.mediaType === 'movie' ? '🎬' : '📺'}</div>`;

        const inLibBadge = item.inLibrary ? `<span class="badge badge-green">In Library</span>` : '';
        const typeBadge  = `<span class="badge badge-blue">${item.mediaType === 'movie' ? 'Movie' : 'TV'}</span>`;
        const rating     = item.rating ? `⭐ ${item.rating}` : '';

        const addBtnHtml = item.inLibrary
            ? `<button class="card-btn card-btn-done" disabled>✓ Owned</button>`
            : `<button class="card-btn card-btn-add" id="addbtn-${prefix}-${i}" onclick="addMedia('${item.mediaType}','${prefix}',${i})">+ Add</button>`;

        const tmdbUrlType = item.mediaType === 'movie' ? 'movie' : 'tv';
        const infoBtnHtml = item.tmdbId
            ? `<a class="disc-btn-info" href="https://www.themoviedb.org/${tmdbUrlType}/${item.tmdbId}" target="_blank" rel="noopener" title="View on TMDb">ℹ️</a>`
            : '';

        card.innerHTML = `
            ${posterHtml}
            <div class="card-body">
                <div class="card-title">${esc(item.title)}</div>
                <div class="card-meta">${esc(item.year || '')} ${rating}</div>
                <div class="card-badges">${typeBadge}${inLibBadge}</div>
                <div class="card-actions">${addBtnHtml}${infoBtnHtml}</div>
            </div>`;

        // Store item data on the element
        card.dataset.item = JSON.stringify(item);
        return card;
    }

    // ── Add to Sonarr/Radarr ──────────────────────────────────────────────
    async function addMedia(mediaType, prefix, i) {
        const btn = document.getElementById(`addbtn-${prefix}-${i}`);
        const card = btn.closest('.media-card');
        const item = JSON.parse(card.dataset.item);

        btn.disabled = true;
        btn.textContent = '…';

        const endpoint = mediaType === 'movie' ? '/api/media/radarr-search' : '/api/media/sonarr-search';
        try {
            const r = await fetch(`${endpoint}?q=${encodeURIComponent(item.title)}`);
            const data = await r.json();
            if (data.error) { btn.textContent = 'Error'; setTimeout(() => { btn.textContent = '+ Add'; btn.disabled = false; }, 2500); toast(data.error, 'error'); return; }
            if (!data.results || data.results.length === 0) { btn.textContent = 'Not found'; setTimeout(() => { btn.textContent = '+ Add'; btn.disabled = false; }, 2500); return; }

            // Always open modal so user can choose folder, profile, and Plex watchlist
            pendingAdd = { btn, item: data.results[0], profiles: data.profiles || [], rootFolders: data.rootFolders || [], type: mediaType };
            openModal(data.profiles || [], data.rootFolders || [], item.title);
        } catch(e) {
            btn.textContent = '+ Add';
            btn.disabled = false;
            toast('Failed to reach server.', 'error');
        }
    }

    async function doAdd(mediaType, item, profileId, rootFolderPath, btn) {
        try {
            const r = await fetch('/api/media-chat/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: mediaType === 'movie' ? 'movie' : 'show', item, profileId, rootFolderPath })
            });
            const result = await r.json();
            if (result.success || result.already_exists) {
                btn.textContent = '✓ Added';
                btn.className = 'card-btn card-btn-done';
                btn.disabled = true;
                toast(result.already_exists ? 'Already in library!' : 'Added successfully!', 'success');
                return true;
            } else {
                btn.textContent = '+ Add';
                btn.disabled = false;
                toast(result.message || 'Failed to add.', 'error');
                return false;
            }
        } catch(e) {
            btn.textContent = '+ Add';
            btn.disabled = false;
            toast('Failed to add.', 'error');
            return false;
        }
    }

    // ── Add modal ──────────────────────────────────────────────────────────
    function openModal(profiles, rootFolders, title) {
        document.getElementById('modalTitle').textContent = `Add "${title}"`;

        // Profile section
        const profSection = document.getElementById('modalProfileSection');
        const profEl = document.getElementById('modalProfiles');
        if (profiles.length <= 1) {
            profSection.style.display = 'none';
        } else {
            profSection.style.display = '';
            let selected = profiles[0].id;
            profEl.innerHTML = profiles.map(p =>
                `<div class="modal-item${p === profiles[0] ? ' selected' : ''}" data-profile-id="${p.id}" onclick="selectProfile(this,${p.id})">${esc(p.name)}</div>`
            ).join('');
            profEl.dataset.selected = profiles[0].id;
        }

        // Folder section
        const folderSection = document.getElementById('modalFolderSection');
        const folderSelect = document.getElementById('modalFolderSelect');
        if (rootFolders.length === 0) {
            folderSection.style.display = 'none';
        } else {
            folderSection.style.display = '';
            folderSelect.innerHTML = rootFolders.map(f =>
                `<option value="${esc(f.path)}">${esc(f.path)} (${f.freeGB} GB free)</option>`
            ).join('');
        }

        // Reset watchlist checkbox
        document.getElementById('modalWatchlistCheck').checked = false;

        document.getElementById('profileModal').classList.add('open');
    }

    function selectProfile(el, profileId) {
        document.querySelectorAll('#modalProfiles .modal-item').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('modalProfiles').dataset.selected = profileId;
    }

    async function confirmAdd() {
        if (!pendingAdd) return;
        const { btn, item, type, profiles, rootFolders } = pendingAdd;

        // Read selected profile
        const profEl = document.getElementById('modalProfiles');
        const profileId = profiles.length > 1 ? parseInt(profEl.dataset.selected) : (profiles.length ? profiles[0].id : null);

        // Read selected folder
        const folderSelect = document.getElementById('modalFolderSelect');
        const rootFolderPath = rootFolders.length ? folderSelect.value : '';

        // Plex watchlist flag
        const addToWatchlist = document.getElementById('modalWatchlistCheck').checked;

        closeModal(false); // close without resetting btn

        const succeeded = await doAdd(type, item, profileId, rootFolderPath, btn);

        if (succeeded && addToWatchlist) {
            toast('Adding to Plex watchlist…', 'info');
            try {
                const wr = await fetch('/api/media/plex-watchlist-add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: item.title,
                        tmdb_id: item.tmdbId || item.tmdb_id || null,
                        year: item.year || null,
                        media_type: type === 'movie' ? 'movie' : 'tv'
                    })
                });
                const wdata = await wr.json();
                toast(wdata.success ? `"${item.title}" added to Plex watchlist!` : (wdata.error || 'Could not add to Plex watchlist.'), wdata.success ? 'success' : 'error');
            } catch(e) {
                toast('Could not reach Plex watchlist.', 'error');
            }
        }
    }

    function closeModal(resetBtn = true) {
        document.getElementById('profileModal').classList.remove('open');
        if (resetBtn && pendingAdd) {
            pendingAdd.btn.textContent = '+ Add';
            pendingAdd.btn.disabled = false;
        }
        pendingAdd = null;
    }

    // ── Watchlist ──────────────────────────────────────────────────────────
    async function loadWatchlist() {
        loaded.watchlist = true;
        const el = document.getElementById('wl-content');
        try {
            const r = await fetch('/api/media/watchlist');
            const data = await r.json();
            if (data.error) { el.innerHTML = `<div class="state-msg">${esc(data.error)}</div>`; return; }
            if (!data.items || data.items.length === 0) {
                el.innerHTML = `<div class="state-msg"><div class="icon">🟡</div>Your Plex watchlist is empty.</div>`;
                return;
            }
            renderWatchlist(data.items, el);
        } catch(e) {
            el.innerHTML = `<div class="state-msg">Failed to load watchlist.</div>`;
        }
    }

    function renderWatchlist(items, container) {
        const list = document.createElement('div');
        list.className = 'wl-list';
        items.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'wl-item';
            div.id = `wl-item-${i}`;
            const icon = item.mediaType === 'movie' ? '🎬' : '📺';
            const posterHtml = item.poster
                ? `<img class="wl-poster" src="${esc(item.poster)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;wl-poster-ph&quot;>${icon}</div>'">`
                : `<div class="wl-poster-ph">${icon}</div>`;
            const inLibBadge = item.inLibrary ? '<span class="badge badge-green" style="font-size:10px">In Library</span>' : '';
            const addBtn = !item.inLibrary
                ? `<button class="wl-btn wl-btn-add" onclick="addFromWatchlist(${i})">+ Add</button>`
                : '';
            div.innerHTML = `
                ${posterHtml}
                <div class="wl-info">
                    <div class="wl-title">${esc(item.title)}</div>
                    <div class="wl-meta">${esc(item.mediaType || '')} ${item.year ? '· ' + item.year : ''}</div>
                    <div style="margin-top:3px">${inLibBadge}</div>
                </div>
                <div class="wl-actions">
                    ${addBtn}
                    <button class="wl-btn wl-btn-remove" onclick="removeFromWatchlist(${i})">Remove</button>
                </div>`;
            div.dataset.item = JSON.stringify(item);
            list.appendChild(div);
        });
        container.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">${items.length} items on your watchlist</div>`;
        container.appendChild(list);
    }

    async function addFromWatchlist(i) {
        const div = document.getElementById(`wl-item-${i}`);
        const item = JSON.parse(div.dataset.item);
        const addBtn = div.querySelector('.wl-btn-add');
        if (!addBtn) return;
        addBtn.disabled = true;
        addBtn.textContent = '…';

        const mediaType = item.mediaType === 'movie' ? 'movie' : 'show';
        const endpoint = mediaType === 'movie' ? '/api/media/radarr-search' : '/api/media/sonarr-search';
        try {
            const r = await fetch(`${endpoint}?q=${encodeURIComponent(item.title)}`);
            const data = await r.json();
            if (!data.results || !data.results.length) { addBtn.textContent = 'Not found'; return; }
            const profileId = data.profiles && data.profiles.length ? data.profiles[0].id : null;
            const res = await fetch('/api/media-chat/add', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: mediaType, item: data.results[0], profileId })
            });
            const result = await res.json();
            if (result.success || result.already_exists) {
                addBtn.textContent = '✓ Added';
                addBtn.disabled = true;
                toast('Added to library!', 'success');
            } else {
                addBtn.textContent = '+ Add';
                addBtn.disabled = false;
                toast(result.message || 'Failed.', 'error');
            }
        } catch(e) {
            addBtn.textContent = '+ Add';
            addBtn.disabled = false;
        }
    }

    async function removeFromWatchlist(i) {
        const div = document.getElementById(`wl-item-${i}`);
        const item = JSON.parse(div.dataset.item);
        if (!confirm(`Remove "${item.title}" from your Plex watchlist?`)) return;
        const removeBtn = div.querySelector('.wl-btn-remove');
        removeBtn.disabled = true;
        removeBtn.textContent = '…';
        try {
            const r = await fetch('/api/media-chat/delete', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'watchlist_remove', item })
            });
            const result = await r.json();
            if (result.success) {
                div.style.opacity = '0.4';
                div.style.pointerEvents = 'none';
                removeBtn.textContent = '✓ Removed';
                toast('Removed from watchlist.', 'success');
            } else {
                removeBtn.textContent = 'Remove';
                removeBtn.disabled = false;
                toast(result.message || 'Failed.', 'error');
            }
        } catch(e) {
            removeBtn.textContent = 'Remove';
            removeBtn.disabled = false;
        }
    }

    // ── Discover ───────────────────────────────────────────────────────────
    let discoverData = [];  // flat list of all disc items keyed by global index

    async function loadDiscover() {
        loaded.discover = true;
        const el = document.getElementById('discover-content');

        function discCard(item) {
            const gi = discoverData.length;  // global index
            discoverData.push(item);
            const isLib = item.inLibrary;
            const rating = item.rating > 0 ? `⭐ ${item.rating}` : '';
            const today = new Date().toISOString().slice(0, 10);
            const upcoming = item.releaseDate && item.releaseDate > today;
            const dateLabel = item.releaseDate
                ? new Date(item.releaseDate + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                : '';
            const typeLabel = item.mediaType === 'movie' ? 'Movie' : 'TV';
            const addBtnHtml = isLib
                ? `<button class="disc-btn-done" disabled>✓ Library</button>`
                : `<button class="disc-btn-add" id="dc-add-${gi}" onclick="discAdd(${gi})">+ Add</button>`;
            const wlBtnHtml = `<button class="disc-btn-wl" id="dc-wl-${gi}" onclick="discWatchlist(${gi})">👁 WL</button>`;
            return `<div class="disc-card">
                ${item.poster ? `<img class="disc-poster" src="${esc(item.poster)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                <div class="disc-poster-ph" style="${item.poster ? 'display:none' : ''}">${item.mediaType === 'movie' ? '🎬' : '📺'}</div>
                <div class="disc-body">
                    <div class="disc-title">${esc(item.title)}</div>
                    <div class="disc-meta">${typeLabel}${item.year ? ' · ' + item.year : ''}</div>
                    ${rating ? `<div class="disc-rating">${rating}</div>` : ''}
                    ${upcoming && dateLabel ? `<div class="disc-date">📅 ${dateLabel}</div>` : ''}
                    ${isLib ? `<span class="disc-badge-lib">In Library</span>` : ''}
                    ${item.overview ? `<div class="disc-overview">${esc(item.overview)}</div>` : ''}
                    <div class="disc-btn">${addBtnHtml}${wlBtnHtml}${item.tmdbUrl ? `<a class="disc-btn-info" href="${esc(item.tmdbUrl)}" target="_blank" rel="noopener" title="View on TMDb">ℹ️</a>` : ''}</div>
                </div>
            </div>`;
        }

        function discSection(label, items) {
            if (!items || items.length === 0) return '';
            return `<div class="discover-section">
                <div class="section-title">${label}</div>
                <div class="discover-row">${items.map(discCard).join('')}</div>
            </div>`;
        }

        try {
            el.innerHTML = '<div class="state-msg"><div class="spinner"></div>Fetching recommendations…</div>';
            discoverData = [];
            const r = await fetch('/api/media/discover');
            const data = await r.json();
            if (data.error) { el.innerHTML = `<div class="state-msg">${esc(data.error)}</div>`; return; }
            let html = '';
            html += discSection('🔥 Trending Movies This Week', data.trending_movies);
            html += discSection('📺 Trending TV This Week', data.trending_tv);
            html += discSection('🎬 Coming Soon — Movies', data.coming_soon);
            html += discSection('📺 Coming Soon — TV Shows', data.upcoming_tv);
            html += discSection('🍿 Popular on Streaming', data.streaming_now);
            html += discSection('📡 New on TV', data.new_on_tv);
            el.innerHTML = html || '<div class="state-msg">No recommendations available.</div>';
        } catch(e) {
            el.innerHTML = '<div class="state-msg">Failed to load recommendations.</div>';
        }
    }

    async function discAdd(gi) {
        const item = discoverData[gi];
        if (!item) return;
        const addBtn = document.getElementById(`dc-add-${gi}`);
        if (!addBtn || addBtn.disabled) return;
        addBtn.disabled = true;
        addBtn.textContent = '…';
        const arr = item.mediaType === 'movie' ? 'radarr' : 'sonarr';
        try {
            const res = await fetch(`/api/${arr}/profiles`).then(r => r.json());
            const profiles = res.profiles || [];
            const rootFolders = res.folders || [];
            if (res.error && profiles.length === 0) {
                throw new Error(res.error);
            }
            pendingAdd = { btn: addBtn, item, type: item.mediaType, profiles, rootFolders };
            openModal(profiles, rootFolders, item.title);
        } catch(e) {
            addBtn.disabled = false;
            addBtn.textContent = '+ Add';
            toast(e.message || 'Could not load profiles.', 'error');
        }
    }

    async function discWatchlist(gi) {
        const item = discoverData[gi];
        if (!item) return;
        const btn = document.getElementById(`dc-wl-${gi}`);
        if (!btn || btn.disabled) return;
        btn.disabled = true;
        btn.textContent = '…';
        try {
            const r = await fetch('/api/media/plex-watchlist-add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: item.title, tmdb_id: item.tmdbId, year: item.year, media_type: item.mediaType })
            });
            const data = await r.json();
            if (data.success) {
                btn.textContent = '✓ WL';
                btn.className = 'disc-btn-done';
                toast(`"${item.title}" added to Plex watchlist!`, 'success');
            } else {
                btn.disabled = false;
                btn.textContent = '👁 WL';
                toast(data.error || 'Could not add to watchlist.', 'error');
            }
        } catch(e) {
            btn.disabled = false;
            btn.textContent = '👁 WL';
            toast('Could not reach Plex watchlist.', 'error');
        }
    }

    // ── Queue ──────────────────────────────────────────────────────────────
    async function loadQueue() {
        loaded.queue = true;
        const el = document.getElementById('queue-content');
        try {
            const r = await fetch('/api/media/queue');
            const data = await r.json();
            let html = '';
            const all = [...(data.sonarr || []).map(i => ({...i, cat:'TV'})), ...(data.radarr || []).map(i => ({...i, cat:'Movie'}))];
            if (all.length === 0) {
                el.innerHTML = `<div class="state-msg"><div class="icon">✅</div>Download queue is empty.</div>`;
                return;
            }
            html += `<div class="section-title">Downloading (${all.length})</div>`;
            all.forEach(item => {
                const sub = [item.cat, item.episode, item.status, `${item.size}/${item.total} GB`].filter(Boolean).join(' · ');
                html += `<div class="queue-item">
                    <div class="queue-title">${esc(item.title)}</div>
                    <div class="queue-meta">${esc(sub)}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${item.pct}%"></div></div>
                    <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:right">${item.pct}%</div>
                </div>`;
            });
            el.innerHTML = html;
        } catch(e) {
            el.innerHTML = `<div class="state-msg">Failed to load queue.</div>`;
        }
    }

    // ── Activity (recent + calendar) ───────────────────────────────────────
    async function loadActivity() {
        loaded.activity = true;
        const el = document.getElementById('activity-content');
        el.innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading…</div>';

        const [recentRes, calRes, diskRes] = await Promise.allSettled([
            fetch('/api/media/recent').then(r => r.json()),
            fetch('/api/media/calendar').then(r => r.json()),
            fetch('/api/media/disk').then(r => r.json()),
        ]);

        let html = '';

        // Disk
        if (diskRes.status === 'fulfilled') {
            const d = diskRes.value;
            html += `<div class="section-title">Storage</div><div class="disk-grid">`;
            if (d.sonarr) html += `
                <div class="disk-card">
                    <div class="disk-label">📺 TV Library</div>
                    <div class="disk-value">${d.sonarr.freeGB} GB</div>
                    <div class="disk-sub">free · ${d.sonarr.usedGB} GB used</div>
                    <div class="disk-sub">${d.sonarr.shows} shows · ${d.sonarr.episodes} eps</div>
                </div>`;
            if (d.radarr) html += `
                <div class="disk-card">
                    <div class="disk-label">🎬 Movie Library</div>
                    <div class="disk-value">${d.radarr.freeGB} GB</div>
                    <div class="disk-sub">free · ${d.radarr.usedGB} GB used</div>
                    <div class="disk-sub">${d.radarr.movies} movies (${d.radarr.downloaded} downloaded)</div>
                </div>`;
            html += `</div>`;
        }

        // Recently added
        if (recentRes.status === 'fulfilled' && !recentRes.value.error) {
            const items = recentRes.value.items || [];
            if (items.length > 0) {
                html += `<div class="section-title">Recently Added</div>`;
                items.slice(0, 15).forEach(item => {
                    const icon = item.type === 'movie' ? '🎬' : '📺';
                    html += `<div class="cal-item">
                        <div class="cal-date" style="font-size:18px;padding:6px 8px">${icon}</div>
                        <div class="cal-info">
                            <div class="cal-title">${esc(item.label)}</div>
                            ${item.sub ? `<div class="cal-sub">${esc(item.sub)}</div>` : ''}
                        </div>
                    </div>`;
                });
            }
        }

        // Calendar
        if (calRes.status === 'fulfilled') {
            const cal = calRes.value;
            const eps = cal.episodes || [];
            const movs = cal.movies || [];
            if (eps.length + movs.length > 0) {
                html += `<div class="section-title">Coming Up (next 14 days)</div>`;
                eps.forEach(ep => {
                    const icon = ep.hasFile ? '✅' : '⏳';
                    html += `<div class="cal-item">
                        <div class="cal-date">${ep.airDate ? ep.airDate.slice(5) : '—'}</div>
                        <div class="cal-info">
                            <div class="cal-title">${esc(ep.show)}</div>
                            <div class="cal-sub">${esc(ep.episode)} ${esc(ep.title)} ${icon}</div>
                        </div>
                    </div>`;
                });
                movs.forEach(m => {
                    const icon = m.hasFile ? '✅' : '🎬';
                    html += `<div class="cal-item">
                        <div class="cal-date">${m.date ? m.date.slice(5) : '—'}</div>
                        <div class="cal-info">
                            <div class="cal-title">${esc(m.title)}</div>
                            <div class="cal-sub">${esc(String(m.year))} ${icon}</div>
                        </div>
                    </div>`;
                });
            } else {
                html += `<div class="section-title">Coming Up</div><div class="state-msg" style="padding:20px">Nothing scheduled in the next 14 days.</div>`;
            }
        }

        if (!html) html = `<div class="state-msg">No activity data available.</div>`;
        el.innerHTML = html;
    }

    // ── Watchlist search results rendering ─────────────────────────────────
    let wlSearchResultsData = [];

    function renderWlSearchResults(results, container) {
        wlSearchResultsData = results;
        const grid = document.createElement('div');
        grid.className = 'wl-search-results-grid';
        results.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'wl-item';
            const icon = item.mediaType === 'movie' ? '🎬' : '📺';
            const posterHtml = item.poster
                ? `<img class="wl-poster" src="${esc(item.poster)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;wl-poster-ph&quot;>${icon}</div>'">`
                : `<div class="wl-poster-ph">${icon}</div>`;
            const inLibBadge = item.inLibrary ? '<span class="badge badge-green" style="font-size:10px">In Library</span>' : '';
            div.innerHTML = `
                ${posterHtml}
                <div class="wl-info">
                    <div class="wl-title">${esc(item.title)}</div>
                    <div class="wl-meta">${esc(item.mediaType || '')} ${item.year ? '· ' + item.year : ''}</div>
                    <div style="margin-top:3px">${inLibBadge}</div>
                </div>
                <div class="wl-actions">
                    <button class="wl-btn wl-btn-watchlist" id="wlsr-btn-${i}" onclick="addToWatchlistFromSearch(${i})">+ Watchlist</button>
                </div>`;
            div.dataset.title = item.title;
            grid.appendChild(div);
        });
        container.innerHTML = '';
        container.appendChild(grid);
    }

    async function addToWatchlistFromSearch(i) {
        const item = wlSearchResultsData[i] || {};
        const title = item.title || '';
        const btn = document.getElementById(`wlsr-btn-${i}`);
        btn.disabled = true;
        btn.textContent = '…';
        try {
            const r = await fetch('/api/media/plex-watchlist-add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title,
                    tmdb_id: item.tmdbId || item.tmdb_id || null,
                    year: item.year || null,
                    media_type: item.mediaType || ''
                })
            });
            const data = await r.json();
            if (data.success) {
                btn.textContent = '✓ Added';
                btn.className = 'wl-btn wl-btn-watchlist-done';
                toast(`"${title}" added to Plex watchlist!`, 'success');
                // Refresh the watchlist below so it shows immediately
                loaded.watchlist = false;
                loadWatchlist();
            } else {
                btn.textContent = '+ Watchlist';
                btn.disabled = false;
                toast(data.error || 'Could not add to watchlist.', 'error');
            }
        } catch(e) {
            btn.textContent = '+ Watchlist';
            btn.disabled = false;
            toast('Failed to reach server.', 'error');
        }
    }

    // ── Toast ──────────────────────────────────────────────────────────────
    function toast(msg, type = 'success') {
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = msg;
        document.getElementById('toasts').appendChild(el);
        setTimeout(() => el.remove(), 3200);
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function esc(str) {
        return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
