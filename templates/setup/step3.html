{% extends "base.html" %}
{% block title %}Setup - Plex Configuration{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center">
                <h4><i class="bi bi-tv me-2"></i>TV Show Cleanup Setup</h4>
            </div>
            <div class="card-body p-4">
                <div class="wizard-steps">
                    <div class="wizard-step completed"><i class="bi bi-check"></i></div>
                    <div class="wizard-line"></div>
                    <div class="wizard-step completed"><i class="bi bi-check"></i></div>
                    <div class="wizard-line"></div>
                    <div class="wizard-step active">3</div>
                    <div class="wizard-line"></div>
                    <div class="wizard-step">4</div>
                    <div class="wizard-line"></div>
                    <div class="wizard-step">5</div>
                    <div class="wizard-line"></div>
                    <div class="wizard-step">6</div>
                </div>
                
                <h5 class="text-center mb-4"><i class="bi bi-play-circle me-2"></i>Plex Configuration</h5>
                <p class="text-muted text-center mb-4">Connect to your Plex server to check watch history.</p>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="plex_url" class="form-label">Plex URL</label>
                        <input type="url" class="form-control" id="plex_url" name="plex_url" 
                               value="{{ plex_url|default('') }}" placeholder="http://192.168.1.100:32400" required>
                        <div class="form-text">The URL where Plex is accessible</div>
                    </div>
                    <div class="mb-4">
                        <label for="plex_token" class="form-label">Plex Token</label>
                        <input type="text" class="form-control" id="plex_token" name="plex_token" 
                               value="{{ plex_token|default('') }}" required>
                        <div class="form-text">
                            <a href="https://support.plex.tv/articles/204059436-finding-an-authentication-token-x-plex-token/" 
                               target="_blank" class="text-info">How to find your Plex token</a>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('setup_step2') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Back
                        </a>
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            Continue <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
